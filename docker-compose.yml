services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: calidato_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-calidato}
      POSTGRES_USER: ${POSTGRES_USER:-calidato_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calidato_pass}       
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - calidato_pgsql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calidato_user} -d ${POSTGRES_DB:-calidato}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
     
volumes:
  calidato_pgsql_data:
    driver: local
